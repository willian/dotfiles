[selection]
save_to_clipboard = true

[shell]
args = ["-l"]
program = "/opt/homebrew/bin/zsh"

[window]
decorations = "buttonless"
dynamic_padding = false
opacity = 0.95

[window.padding]
x = 20
y = 20
