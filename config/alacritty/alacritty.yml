env:
  TERM: xterm-256color

cursor:
  style:
    shape: Block
  vi_mode_style:
    shape: Beam

draw_bold_text_with_bright_colors: true

font:
  bold:
    family: "DankMono Nerd Font Mono"
    style: Bold
  builtin_box_drawing: true
  italic:
    family: "DankMono Nerd Font Mono"
    style: Italic
  normal:
    family: "DankMono Nerd Font Mono"
    style: Regular
  offset:
    x: 0
    y: 0
  size: 22.0

window:
  decorations: buttonless
  dynamic_padding: false
  opacity: 1.0
  padding:
    x: 0
    y: 4

selection:
  save_to_clipboard: true

shell:
  args:
    - -l
    - -c
    - "tmux attach -t Personal || tmux new -s Personal"
  program: /usr/local/bin/zsh

key_bindings:
  # macOS
  - { action: IncreaseFontSize, key: Equals, mods: Command }
  - { action: IncreaseFontSize, key: Plus, mods: Command }
  - { action: IncreaseFontSize, key: NumpadAdd, mods: Command }
  - { action: DecreaseFontSize, key: Minus, mods: Command }
  - { action: DecreaseFontSize, key: NumpadSubtract, mods: Command }
  - { action: Paste, key: V, mods: Command }
  - { action: Copy, key: C, mods: Command }
  - { action: Hide, key: H, mods: Command }
  - { action: Minimize, key: M, mods: Command }
  - { action: Quit, key: Q, mods: Command }
  - { action: ToggleFullscreen, key: F, mods: Command|Control }
  - { action: SearchForward, key: F, mods: Command }
  - { action: SearchBackward, key: B, mods: Command }
  - { chars: "\x1BF", key: Right, mods: Alt }
  - { chars: "\x1BB", key: Left, mods: Alt }

  # Tmux
  - { chars: "\x02\x73", key: K, mods: Command } # Select a new tmux session for the attached client interactively
  - { chars: "\x02\x31", key: Key1, mods: Command } # Select window 1
  - { chars: "\x02\x32", key: Key2, mods: Command } # Select window 2
  - { chars: "\x02\x33", key: Key3, mods: Command } # Select window 3
  - { chars: "\x02\x34", key: Key4, mods: Command } # Select window 4
  - { chars: "\x02\x35", key: Key5, mods: Command } # Select window 5
  - { chars: "\x02\x36", key: Key6, mods: Command } # Select window 6
  - { chars: "\x02\x37", key: Key7, mods: Command } # Select window 7
  - { chars: "\x02\x38", key: Key8, mods: Command } # Select window 8
  - { chars: "\x02\x39", key: Key9, mods: Command } # Select window 9
  - { chars: "\x02\x4c", key: L, mods: Command } # Switch to last tmux session
  - { chars: "\x02\x5b", key: LBracket, mods: Command } # Switch to last tmux session
  - { chars: "\x02\x70", key: LBracket, mods: Command|Shift } # Change to the previous tmux window
  - { chars: "\x02\x25", key: N, mods: Command|Shift } # Split the current pane into two, left and right
  - { chars: "\x02\x25", key: D, mods: Command } # Split the current pane into two, left and right
  - { chars: "\x02\x22", key: N, mods: Command } # Split the current pane into two, top and bottom
  - { chars: "\x02\x22", key: D, mods: Command|Shift } # Split the current pane into two, top and bottom
  - { chars: "\x02\x64", key: Q, mods: Command } # Detach the current tmux client
  - { chars: "\x02\x6e", key: RBracket, mods: Command|Shift } # Change to the next tmux window
  - { chars: "\x1b\x3a\x77\x0a", key: S, mods: Command } # Type <escape>:w<enter> to save neovim
  - { chars: "\x02\x63", key: T, mods: Command } # Create a new tmux window
  - { chars: "\x02\x21", key: T, mods: Command|Shift } # Break the current tmux pane out of the tmux window
  - { chars: "\x02\x78", key: W, mods: Command } # Kill the current tmux pane (and window if last pane)
  - { chars: "\x02\x7a", key: Z, mods: Command } # Toggle the zoom state of the current tmux pane

live_config_reload: true

schemes:
  nightfly: &nightfly # Default colors
    primary:
      background: "#011627"
      foreground: "#acb4c2"
      bright_foreground: "#eeeeee"

    # Cursor colors
    cursor:
